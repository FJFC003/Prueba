<!DOCTYPE html>
<html layout:decorate="~{layout/base}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Registrar Empleado</title>
</head>
<body>
    <div layout:fragment="contenido" class="container-fluid">
        <h1 class="h3 mb-4 text-gray-800">Registrar Nuevo Empleado</h1>

        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Formulario de Datos</h6>
            </div>
            <div class="card-body">
                <form th:action="@{/empleados/guardar}" method="post">
                    
                    <div class="form-group row">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label>Nombres</label>
                            <input type="text" class="form-control" placeholder="Ej. Juan Andrés" required>
                        </div>
                        <div class="col-sm-6">
                            <label>Apellidos</label>
                            <input type="text" class="form-control" placeholder="Ej. Pérez" required>
                        </div>
                    </div>
                    
                    <div class="form-group row">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label>Cédula</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-sm-6">
                            <label>Cargo de Laboratorio</label>
                            <select class="form-control">
                                <option>Seleccione...</option>
                                <option>Analista de Laboratorio</option>
                                <option>Supervisor</option>
                            </select>
                        </div>
                    </div>

                    <hr>
                    <button type="submit" class="btn btn-success">Guardar Registro</button>
                    <a th:href="@{/empleados}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
