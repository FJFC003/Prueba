<!DOCTYPE html>
<html layout:decorate="~{layout/base}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Lista de Empleados</title>
</head>
<body>
    <div layout:fragment="contenido" class="container-fluid">
        <h1 class="h3 mb-2 text-gray-800">Gestión de Empleados</h1>
        <p class="mb-4">Administración del personal técnico y administrativo del laboratorio.</p>

        <a th:href="@{/empleados/nuevo}" class="btn btn-primary mb-3 shadow-sm">
            <i class="fas fa-plus fa-sm text-white-50"></i> Nuevo Empleado
        </a>

        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Registros Existentes</h6>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover" width="100%" cellspacing="0">
                        <thead class="thead-light">
                            <tr>
                                <th>Cédula</th>
                                <th>Nombres</th>
                                <th>Apellidos</th>
                                <th>Correo</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emp : ${listaEmpleados}">
                                <td th:text="${emp.cedula}"></td>
                                <td th:text="${emp.nombres}"></td>
                                <td th:text="${emp.apellidos}"></td>
                                <td th:text="${emp.correo}"></td>
                                <td class="text-center">
                                    <a href="#" class="btn btn-warning btn-circle btn-sm" title="Editar">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a href="#" class="btn btn-danger btn-circle btn-sm" title="Eliminar">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            
                            <tr th:if="${#lists.isEmpty(listaEmpleados)}">
                                <td colspan="5" class="text-center">No hay empleados registrados en el sistema.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
